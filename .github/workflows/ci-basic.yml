name: build and test

on:
    workflow_dispatch:

jobs:
    build-and-test:
        runs-on: ubuntu-22.04
    
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install essentials and compiler
              run: |
                sudo apt-get update
                sudo apt-get install -y g++

            - name: Install cmake
              uses: jwlawson/actions-setup-cmake@v2
              with:
                cmake-version: '4.2.3'

            - name: Build
              run: |
                cmake -B build
                cmake --build build

            - name: Run tests
              run: | 

                echo "🔍 Running Test 1..."
                if ! output=$(./build/programm "hello"); then
                    echo "❌ Test 1 FAILED: expected exit code 0, got $?"
                    exit 1
                fi
                if [ "$output" != "hello" ]; then
                    echo "❌ Test 1 FAILED: wrong output"
                    exit 1
                fi
                echo "✅ Test 1 PASSED"

                
                echo "🔍 Running Test 2..."
                if ./build/programm > /dev/null 2>&1; then
                    echo "❌ Test 2 FAILED: expected exit code 1, got 0"
                    exit 1
                fi
                echo "✅ Test 2 PASSED"
                
                echo "🎉 All tests passed!"
